<!DOCTYPE html>
<html lang="pt-BR">    
    <!--adiciona linguagem-->
<head>
    <meta charset="UTF-8"> <!--padrao de caracteres -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATIVIDADE html</title>
    <link rel="stylesheet" href="styles.css">
</head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
    <h1>
        Atividade <samp> Protocolo http</samp>
    </h1>

    <h2>
        Formulário de cadastro
    </h2>

    <form action="recebe.html" method="get">

        <div class="campo">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
        
        </div>

        <div class="campo">
        <label for="email">Email:</label>
        <input type="email" name="email" id="email"placeholder="Digite seu email" required>
        
        </div>

        <div class="campo">
        <label for="idade">Idade:</label>
        <input type="number" name="idade" id="idade" placeholder="Digite sua idade" required>
        
        </div>
        
        <div class="campo"> 
        <label for="senha">Senha:</label>
        <input type="text" name="senha" id="senha" placeholder="Digite sua senha" required>

        </div>

        <input type="submit" value="Enviar">


    </form>

    
</body>


</html>
